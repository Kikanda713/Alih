# SPA Tindisa servie en interne (le reverse-proxy public/TLS est le nginx du backend).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # Assets fingerprintés : cache long.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Routing SPA : tout le reste retombe sur index.html (react-router).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
